configuration:
  llm_mode:
    name: LLM Mode
    description: >-
      "cloud" uses HomeMind's managed AI service (requires a Cloud API Key from homemind.veganostr.com).
      "byok" lets you use your own API key from Anthropic, OpenAI, OpenRouter, or a local Ollama instance.
  proxy_api_key:
    name: Cloud API Key
    description: >-
      Your HomeMind Cloud API key. Get one at homemind.veganostr.com.
      Only needed when LLM Mode is "cloud".
  llm_provider:
    name: LLM Provider
    description: >-
      Which LLM backend to use. Only applies when LLM Mode is "byok".
      OpenRouter gives access to many models (Anthropic, OpenAI, etc.) with a single key.
  llm_api_key:
    name: API Key
    description: >-
      Your API key for the selected provider. Only needed when LLM Mode is "byok".
  llm_model:
    name: Model
    description: >-
      Model ID. Examples: anthropic/claude-haiku-4.5 (OpenRouter), claude-haiku-4-5-20251001 (Anthropic),
      gpt-4o-mini (OpenAI). Leave empty for provider default.
  llm_base_url:
    name: API Base URL
    description: >-
      Custom API endpoint. For OpenAI-compatible APIs or Ollama. Leave empty for default.
  custom_prompt:
    name: Custom Prompt
    description: >-
      Override the AI assistant's personality and instructions. Leave empty for the default Home Mind persona.
  log_level:
    name: Log Level
    description: >-
      Logging verbosity. Use "debug" for troubleshooting.
